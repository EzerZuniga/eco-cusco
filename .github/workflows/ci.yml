name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ── Job 1: Build, Test y Package ────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: mvn clean compile -DskipTests -B

      - name: Run tests
        env:
          SPRING_PROFILES_ACTIVE: test
        run: mvn test -B

      - name: Package application
        run: mvn package -DskipTests -B

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cusco-limpio-api
          path: target/*.jar
          retention-days: 7

  # ── Job 2: Verificación de Compilación ──────────────────────────────────────
  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Verify compilation (sin tests)
        run: mvn clean verify -DskipTests -B
