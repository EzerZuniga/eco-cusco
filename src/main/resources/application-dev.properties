# Profile: development
server.port=8080

# Datasource (in-memory H2 for development)
spring.datasource.url=jdbc:h2:mem:ecocusco;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
# En dev validamos el modelo contra scripts SQL para evitar drift de esquema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Inicialización SQL explícita para H2 (estructura ordenada por motor)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/h2/schema.sql
spring.sql.init.data-locations=classpath:db/h2/data.sql

# JWT (development secret — MUST be changed for production, minimum 256 bits for HS256)
app.jwt.secret=cusco-limpio-dev-secret-key-change-me-in-production-this-must-be-at-least-256-bits-long
app.jwt.expiration-ms=86400000

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JSON
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging
logging.level.org.springframework=INFO
logging.level.com.cusco=DEBUG

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200

