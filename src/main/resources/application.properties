# Application base properties
# Default profile: use `dev` during local development
spring.profiles.active=dev

# Application name
spring.application.name=cusco-limpio-api

# Basic server settings
server.servlet.context-path=/

# Disable open-in-view (best practice for API projects)
spring.jpa.open-in-view=false

# Keep this file minimal; use `application-dev.properties` and `application-prod.properties`
